# Story Lifecycle — Minimal Profile (2 stages)
# Default profile: design → implement. 最小闭环，快速验证。
version: 4
cli: claude

stages:
  design:
    order: 1
    description: "需求澄清与方案设计"
    skill: "/brainstorming"
    confirm: false
    review: false
    max_retries: 2
    allowed_providers: [deepseek, zhipu]
    expected_outputs:
      - spec_path
      - complexity
    next_default: [implement]

  implement:
    order: 2
    description: "编码实现"
    confirm: false
    review: false
    max_retries: 3
    allowed_providers: [deepseek, zhipu, anthropic]
    expected_outputs:
      - files_changed
      - summary
    next_default: []

quality:
  enabled: false

adversarial:
  enabled: false

reviewers: {}
