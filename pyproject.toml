[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "story-lifecycle"
version = "0.5.43"
description = "AI-powered development workflow orchestrator — from TAPD/Jira story to production"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "zhaozihao"},
]
keywords = ["ai", "claude-code", "orchestrator", "workflow", "devtools"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "click>=8.1.0",
    "rich>=13.0.0",
    "pyyaml>=6.0",
    "langgraph>=1.0,<2.0",
    "langgraph-checkpoint-sqlite>=3.0,<4.0",
    "httpx>=0.27.0",
    "plyer>=2.1.0",
    "filelock>=3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "pytest-xdist>=3.0",
    "ruff>=0.11.0",
    "build>=1.0",
    "twine>=6.0",
    "textual>=3.0",
]

tui = [
    "textual>=3.0",
]

[project.scripts]
story = "story_lifecycle.cli.main:cli"


[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/story_lifecycle"]
artifacts = ["src/story_lifecycle/profiles/**", "src/story_lifecycle/prompts/**"]
