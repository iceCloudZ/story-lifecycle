name: CI

# Monorepo CI — currently scopes to story-lifecycle (the publishable package).
# TODO: extend matrix to cover story-miner / knowledge / testing once each has
# its own install/test entry. Paths point into packages/ from the repo root.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dev tools
        # Root pyproject is a workspace container, NOT a buildable package
        # (packages=[], no wheel — by design, per AGENTS.md). Installing it
        # editable fails on hatchling's file-selection heuristic. Install the
        # dev deps directly instead.
        run: pip install "pytest>=8.0" "pytest-asyncio>=0.24.0" "ruff>=0.11.0"

      - name: Install story-lifecycle (editable)
        run: pip install -e packages/story-lifecycle

      - name: Ruff lint
        run: ruff check packages/story-lifecycle/src/

      - name: Ruff format check
        run: ruff format --check packages/story-lifecycle/src/

  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev tools
        # Root pyproject is a workspace container, not a buildable package —
        # see lint job note. Install dev deps directly.
        run: pip install "pytest>=8.0" "pytest-asyncio>=0.24.0" "pytest-timeout>=0.9.0" "ruff>=0.11.0"

      - name: Install story-lifecycle + its deps (editable)
        run: |
          pip install -e packages/story-lifecycle
          pip install -e packages/knowledge
          pip install pytest-cov

      - name: Run tests (story-lifecycle + cross-package contracts)
        # story-lifecycle depends on the knowledge package, so contract tests
        # (tests/contracts) are included. Root pyproject testpaths also lists
        # miner/testing, but those are out of scope here until they get CI.
        run: pytest packages/story-lifecycle/tests tests/contracts -v --timeout=120

      - name: Coverage (ubuntu/3.12 only — upload artifact)
        # Coverage baseline tracking — NOT a gate yet (baseline 56.1%, target 80%).
        # Uploaded as artifact so PRs can see the delta; see T5.1 report.
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          pytest packages/story-lifecycle/tests tests/contracts \
            --timeout=120 \
            --cov=packages/story-lifecycle/src/story_lifecycle \
            --cov-report=xml:coverage.xml --cov-report=term -q

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  invariants:
    # Architecture red-line gate — 6 invariants from docs/module-architecture/.
    # Runs on one OS/python only (these tests are deterministic, no platform deps)
    # so a breakage fails the PR fast before the full matrix spins up.
    name: Architecture invariants
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dev tools
        # Root pyproject is a workspace container, not a buildable package —
        # see lint job note. Install dev deps directly.
        run: pip install "pytest>=8.0" "pytest-asyncio>=0.24.0" "pytest-timeout>=0.9.0" "ruff>=0.11.0"

      - name: Install story-lifecycle + knowledge (editable)
        run: |
          pip install -e packages/story-lifecycle
          pip install -e packages/knowledge

      - name: Run architecture invariant tests
        # Centralized red-line gate (tests/invariants/). If this fails, a PR
        # broke one of: gate hard-fail / resolver pure-read / SOFT-seam
        # degradation / anchors file contract / infra zero-internal-import /
        # HITL-is-crosscut. See docs/module-architecture/02-modules-overview.md.
        run: pytest packages/story-lifecycle/tests/invariants/ -v --timeout=120

  build-check:
    name: Verify build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Build package
        run: pipx run build packages/story-lifecycle

      - name: Twine check
        run: pipx run twine check packages/story-lifecycle/dist/*
