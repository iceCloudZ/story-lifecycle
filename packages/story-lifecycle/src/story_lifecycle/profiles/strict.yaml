# Story Lifecycle — Strict Profile (3 stages with built-in review loops)
# 严格路径：design → build → verify。评审循环内联在阶段里。
version: 4
cli: claude
execution_mode: interactive_pty
author: zzh                                       # 作者标识，进分支名
branch_rule: "feature/{author}/{summary}_{date}"  # 占位符: {author}/{date}/{summary}/{story_key}/{project}

stages:
  design:
    order: 1
    description: "代码调研与方案设计"
    skill: "/brainstorming"
    confirm: false
    review: true
    max_retries: 2
    allowed_providers: [deepseek, zhipu]
    expected_outputs:
      - research_path
      - spec_path
      - complexity
    next_default: [build]

  build:
    order: 2
    description: "实施计划与编码实现"
    cli: claude
    model: sonnet
    confirm: false
    review: true
    max_retries: 3
    allowed_providers: [deepseek, zhipu, anthropic]
    expected_outputs:
      - plan_path
      - files_changed
      - summary
    next_default: [verify]

  verify:
    order: 3
    description: "验证与交付资料包"
    cli: claude
    model: haiku
    confirm: false
    review: false
    max_retries: 2
    expected_outputs:
      - test_report_path
      - delivery_path
      - context_pack_path
    next_default: []

quality:
  enabled: true
  readiness_check: true
  inject_quality_packet: true
  inject_executor_checklist: true
  block_on_open_high_findings: true
  verification_commands:
    - pytest
    - ruff check src tests

adversarial:
  enabled: true
  plan_loop:
    enabled: true
    stages: [design, build]
    max_rounds: 3
    pass_condition: no_open_blocker_or_major
  code_loop:
    enabled: true
    mode: short_lived
    max_rounds: 3
    pass_condition: no_open_blocker
    fallback: repair_packet
  observability:
    log_round_events: true
    estimate_prompt_segments: true

reviewers:
  design:
    mode: api
    visible: true
    max_rounds: 3
  build:
    mode: api
    visible: true
    max_rounds: 3
