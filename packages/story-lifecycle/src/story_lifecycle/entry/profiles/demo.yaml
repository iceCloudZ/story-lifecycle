# Demo profile — planner is fully mocked, no LLM dependency.
# hidden: 不在前端 profile 下拉显示(仅供 `story demo` 命令用)
version: 2
cli: claude
execution_mode: interactive_pty
hidden: true

stages:
  design:
    order: 1
    description: "需求分析与方案设计"
    skill: "/brainstorming"
    confirm: false
    review: false
    max_retries: 1
    expected_outputs:
      - spec_path
      - complexity
    next_default: [implement]

  implement:
    order: 2
    description: "编码实现"
    confirm: false
    review: false
    max_retries: 1
    expected_outputs:
      - files_changed
      - summary
    next_default: [review]

  review:
    order: 3
    description: "代码审查"
    confirm: false
    review: false
    max_retries: 1
    expected_outputs: []
    next_default: []
