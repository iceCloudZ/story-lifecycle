# Story Lifecycle — Minimal Profile (3 stages)
# Default profile: design → build → verify. PRD intake is prepared before AI starts.
version: 4
cli: claude
execution_mode: interactive_pty
author: zzh                                       # 作者标识，进分支名
branch_rule: "feature/{author}/{story_key}_{summary}_{date}"  # 占位符: {author}/{date}/{summary}/{story_key}/{project}

# confirm 字段语义:stage 完成后是否 paused 等人确认推进(确认闸)。
#   true  = stage done 后 paused,前端显示「✅ 已完成 → 确认推进」卡片,点「推进」走 /advance 才进下一 stage。
#   false = stage done 后自动推进下一 stage(无停顿)。
# minimal 是人主导的默认 profile → design/build 开确认闸,让人 review 后再进;verify 是最后阶段,
# 走自己的 quality gate,无需 stage 间确认闸,保持 false。CI/自动化 profile(realtest/swebench/strict)
# 应保持 confirm:false 跑全自动。
stages:
  design:
    order: 1
    description: "代码调研与方案设计"
    cli: claude
    skill: "/brainstorming"
    confirm: true
    review: false
    max_retries: 2
    allowed_providers: [deepseek, zhipu]
    expected_outputs:
      - research_path
      - spec_path
      - complexity
    next_default: [build]

  build:
    order: 2
    description: "实施计划与编码实现"
    cli: claude
    confirm: true
    review: false
    max_retries: 3
    allowed_providers: [deepseek, zhipu, anthropic]
    expected_outputs:
      - plan_path
      - files_changed
      - summary
    next_default: [verify]

  verify:
    order: 3
    description: "验证与交付资料包"
    cli: claude
    confirm: false
    review: false
    max_retries: 2
    allowed_providers: [deepseek, zhipu, anthropic]
    expected_outputs:
      - test_report_path
      - delivery_path
      - context_pack_path
    next_default: []

quality:
  enabled: false

adversarial:
  enabled: false

reviewers: {}

# STORY-STATE-MODEL: Story 业务状态机(第一公民,独立于阶段)。每个状态「拥有」一组
# stages(execute),全 done 后按 confirm 规则转移到 next 状态。driver 跑完一个状态
# 的所有 stages → 查 confirm → 转/停。与阶段间 confirm 闸并存,Story 状态闸优先。
#   confirm.type:
#     ui_button — paused 等人点「进入下一状态」(前端 /lifecycle/advance)
#     config    — 看 key 指定的全局配置,值 true 则自动转移(无人值守)
#     none      — 无条件转移
# 无 story_states 段的 profile → driver 退化成扁平阶段行为(向后兼容)。
story_states:
  开发:
    stages: [design, build]        # 开发状态跑这两个阶段
    next: 测试
    confirm: {type: ui_button, label: "完成开发，进入测试"}
  测试:
    stages: [verify]
    next: 上线
    confirm: {type: config, key: auto_advance_test}   # 默认未配=手动, 配 true 自动
  上线:
    stages: []                     # minimal 无上线阶段;等车/待发布占位
    next: 结项
    confirm: {type: none}
  结项:
    stages: []                     # 真终态(TAPD closed 映射到此);next=null
    next: null
    confirm: {type: none}

# TAPD 状态 → 本地 lifecycle_state 映射(同步 sync_service 按此自动写 lifecycle_state)。
# 仅当映射结果相对当前 lifecycle_state 是「前进」才写(防回退,见 _is_forward)。
# 未命中的 tapd_status 不动 lifecycle_state。map key = tapd_type(story/bug/subtask)。
#   story 需求态: open/progressing/reopened
#   bug 缺陷态:   new/reopened/assigned/resolving
#   终态(共用):   resolved/rejected/closed
tapd_state_map:
  story:
    progressing: 开发             # 进行中 → 开发
    resolved: 上线                # 已解决 → 上线(等车/待发布)
    closed: 结项                  # 关闭 → 结项(真终态)
    rejected: 结项                # 被拒也算完结
  bug:
    assigned: 开发
    resolving: 开发               # 修复中 → 开发
    resolved: 上线
    closed: 结项
  subtask:                        # 子任务按 story 规则
    progressing: 开发
    resolved: 上线
    closed: 结项
