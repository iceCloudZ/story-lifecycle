[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "story-knowledge"
version = "0.1.0"
description = "Unified knowledge layer for story-lifecycle + story-miner"
readme = "schema.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "zhaozihao"},
]
keywords = ["ai", "agent", "knowledge", "workflow"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]

dependencies = [
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/knowledge"]
